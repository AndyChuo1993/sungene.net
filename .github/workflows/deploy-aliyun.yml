name: Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --prefer-offline --no-audit

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare standalone package
        run: |
          rm -rf deploy
          mkdir -p deploy/.next

          cp -r .next/standalone deploy/.next/
          cp -r .next/static deploy/.next/
          cp -r public deploy/

      - name: Generate runtime env file
        run: |
          cat > deploy/.env.runtime <<EOF
          HOSTNAME=0.0.0.0
          PORT=3000
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS="${{ secrets.SMTP_PASS }}"
          INQUIRY_TO=${{ secrets.INQUIRY_TO }}
          MAIL_FROM="${{ secrets.MAIL_FROM }}"
          INQUIRY_REPLY_TO=${{ secrets.INQUIRY_REPLY_TO }}
          EOF

      - name: Pack deploy files
        run: tar -czf deploy.tar.gz -C deploy .

      - name: Restore SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALI_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/aliyun_key
          chmod 600 ~/.ssh/aliyun_key
          ssh-keyscan -p "${{ secrets.ALI_PORT }}" "${{ secrets.ALI_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload tarball to Aliyun
        run: |
          scp -P "${{ secrets.ALI_PORT }}" \
            -i ~/.ssh/aliyun_key \
            deploy.tar.gz \
            "${{ secrets.ALI_USER }}@${{ secrets.ALI_HOST }}:${{ secrets.ALI_DEPLOY_PATH }}/deploy.tar.gz"

      - name: Extract and restart on Aliyun
        run: |
          ssh -p "${{ secrets.ALI_PORT }}" -i ~/.ssh/aliyun_key "${{ secrets.ALI_USER }}@${{ secrets.ALI_HOST }}" "
            set -ex
            cd '${{ secrets.ALI_DEPLOY_PATH }}'

            rm -rf .next
            rm -rf public

            tar -xzf deploy.tar.gz -C .
            rm -f deploy.tar.gz

            mkdir -p .next/standalone/.next
            cp -r -f .next/static .next/standalone/.next/
            cp -r -f public .next/standalone/

            fuser -k 3000/tcp || true

            # ===== 啟動時載入 ENV =====
            nohup sh -c 'set -a; . ./.env.runtime; set +a; node ./.next/standalone/server.js' > app.log 2>&1 &
          "

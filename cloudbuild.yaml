steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/ai-trade-prod/ai-trade-web:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push image'
    args:
      - 'push'
      - 'gcr.io/ai-trade-prod/ai-trade-web:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-trade-web'
      - '--image'
      - 'gcr.io/ai-trade-prod/ai-trade-web:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'gcr.io/ai-trade-prod/ai-trade-web:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2240"/>
      <stop offset="100%" stop-color="#081a2a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Blueprint grid -->
  <g opacity="0.08" stroke="#4488bb" stroke-width="0.5">
    <line x1="0" y1="30" x2="800" y2="30"/><line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="210" x2="800" y2="210"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="330" x2="800" y2="330"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="390" x2="800" y2="390"/><line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="450" x2="800" y2="450"/><line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="510" x2="800" y2="510"/><line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="0" y1="570" x2="800" y2="570"/>
    <line x1="30" y1="0" x2="30" y2="600"/><line x1="60" y1="0" x2="60" y2="600"/>
    <line x1="90" y1="0" x2="90" y2="600"/><line x1="120" y1="0" x2="120" y2="600"/>
    <line x1="150" y1="0" x2="150" y2="600"/><line x1="180" y1="0" x2="180" y2="600"/>
    <line x1="210" y1="0" x2="210" y2="600"/><line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="270" y1="0" x2="270" y2="600"/><line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="330" y1="0" x2="330" y2="600"/><line x1="360" y1="0" x2="360" y2="600"/>
    <line x1="390" y1="0" x2="390" y2="600"/><line x1="420" y1="0" x2="420" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/><line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="510" y1="0" x2="510" y2="600"/><line x1="540" y1="0" x2="540" y2="600"/>
    <line x1="570" y1="0" x2="570" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="630" y1="0" x2="630" y2="600"/><line x1="660" y1="0" x2="660" y2="600"/>
    <line x1="690" y1="0" x2="690" y2="600"/><line x1="720" y1="0" x2="720" y2="600"/>
    <line x1="750" y1="0" x2="750" y2="600"/><line x1="780" y1="0" x2="780" y2="600"/>
  </g>

  <!-- Large Gear (blueprint style) -->
  <g transform="translate(300, 280)" opacity="0.9">
    <!-- Outer gear -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#3a6a8a" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#3a6a8a" stroke-width="0.5" stroke-dasharray="4,2"/>
    <!-- Gear teeth -->
    <g fill="none" stroke="#3a6a8a" stroke-width="1.5">
      <rect x="-8" y="-155" width="16" height="20" rx="1"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(20, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(40, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(60, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(80, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(100, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(120, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(140, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(160, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(180, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(200, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(220, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(240, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(260, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(280, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(300, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(320, 0, 0)"/>
      <rect x="-8" y="-155" width="16" height="20" rx="1" transform="rotate(340, 0, 0)"/>
    </g>
    <!-- Inner details -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#3a6a8a" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ea580c" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#ea580c" opacity="0.3"/>
    <!-- Spokes -->
    <line x1="0" y1="-50" x2="0" y2="-130" stroke="#3a6a8a" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="0" y1="50" x2="0" y2="130" stroke="#3a6a8a" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="-50" y1="0" x2="-130" y2="0" stroke="#3a6a8a" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="50" y1="0" x2="130" y2="0" stroke="#3a6a8a" stroke-width="0.5" stroke-dasharray="2,2"/>
    <!-- Keyway -->
    <rect x="-4" y="-25" width="8" height="50" fill="none" stroke="#ea580c" stroke-width="0.5"/>
  </g>

  <!-- Smaller gear (interlocking) -->
  <g transform="translate(500, 170)" opacity="0.7">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#3a6a8a" stroke-width="1"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#3a6a8a" stroke-width="0.5" stroke-dasharray="3,2"/>
    <g fill="none" stroke="#3a6a8a" stroke-width="1">
      <rect x="-6" y="-80" width="12" height="15" rx="1"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(30, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(60, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(90, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(120, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(150, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(180, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(210, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(240, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(270, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(300, 0, 0)"/>
      <rect x="-6" y="-80" width="12" height="15" rx="1" transform="rotate(330, 0, 0)"/>
    </g>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#3a6a8a" stroke-width="1"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ea580c" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#ea580c" opacity="0.3"/>
  </g>

  <!-- Dimension lines (engineering drawing style) -->
  <!-- Horizontal dimension -->
  <g stroke="#ea580c" stroke-width="0.8" opacity="0.6">
    <line x1="160" y1="480" x2="440" y2="480"/>
    <line x1="160" y1="475" x2="160" y2="485"/>
    <line x1="440" y1="475" x2="440" y2="485"/>
    <!-- Arrows -->
    <polygon points="160,480 168,477 168,483" fill="#ea580c" opacity="0.6"/>
    <polygon points="440,480 432,477 432,483" fill="#ea580c" opacity="0.6"/>
  </g>
  <text x="280" y="495" font-family="monospace" font-size="11" fill="#ea580c" opacity="0.6" text-anchor="middle">280.00</text>

  <!-- Vertical dimension -->
  <g stroke="#ea580c" stroke-width="0.8" opacity="0.6">
    <line x1="500" y1="140" x2="500" y2="420"/>
    <line x1="495" y1="140" x2="505" y2="140"/>
    <line x1="495" y1="420" x2="505" y2="420"/>
    <polygon points="500,140 497,148 503,148" fill="#ea580c" opacity="0.6"/>
    <polygon points="500,420 497,412 503,412" fill="#ea580c" opacity="0.6"/>
  </g>
  <text x="520" y="285" font-family="monospace" font-size="11" fill="#ea580c" opacity="0.6" transform="rotate(-90, 520, 285)">280.00</text>

  <!-- Caliper/measurement tool -->
  <g transform="translate(600, 350)" opacity="0.5">
    <!-- Main beam -->
    <rect x="0" y="0" width="160" height="8" rx="1" fill="#778899" stroke="#667788" stroke-width="0.5"/>
    <!-- Scale markings -->
    <g stroke="#556677" stroke-width="0.5">
      <line x1="10" y1="0" x2="10" y2="8"/>
      <line x1="20" y1="0" x2="20" y2="4"/>
      <line x1="30" y1="0" x2="30" y2="8"/>
      <line x1="40" y1="0" x2="40" y2="4"/>
      <line x1="50" y1="0" x2="50" y2="8"/>
      <line x1="60" y1="0" x2="60" y2="4"/>
      <line x1="70" y1="0" x2="70" y2="8"/>
      <line x1="80" y1="0" x2="80" y2="4"/>
      <line x1="90" y1="0" x2="90" y2="8"/>
      <line x1="100" y1="0" x2="100" y2="4"/>
      <line x1="110" y1="0" x2="110" y2="8"/>
      <line x1="120" y1="0" x2="120" y2="4"/>
      <line x1="130" y1="0" x2="130" y2="8"/>
      <line x1="140" y1="0" x2="140" y2="4"/>
      <line x1="150" y1="0" x2="150" y2="8"/>
    </g>
    <!-- Fixed jaw -->
    <rect x="0" y="-40" width="8" height="48" rx="1" fill="#778899" stroke="#667788" stroke-width="0.5"/>
    <!-- Moving jaw -->
    <rect x="80" y="-35" width="6" height="43" rx="1" fill="#ea580c" stroke="#c2410c" stroke-width="0.5"/>
    <!-- Depth rod -->
    <rect x="160" y="2" width="40" height="4" rx="1" fill="#778899" stroke="#667788" stroke-width="0.5"/>
  </g>

  <!-- Technical drawing annotations -->
  <!-- Radius callout -->
  <g opacity="0.5">
    <path d="M300,280 L220,180" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="220" cy="180" r="2" fill="#ffffff" opacity="0.5"/>
    <text x="190" y="175" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.5">R140</text>
  </g>
  <!-- Angle indicator -->
  <g opacity="0.4">
    <path d="M300,280 L350,230" fill="none" stroke="#ea580c" stroke-width="0.5"/>
    <path d="M300,280 L360,280" fill="none" stroke="#ea580c" stroke-width="0.5"/>
    <path d="M330,280 A30,30 0 0,0 320,258" fill="none" stroke="#ea580c" stroke-width="0.5"/>
    <text x="340" y="268" font-family="monospace" font-size="9" fill="#ea580c" opacity="0.5">45°</text>
  </g>

  <!-- Surface finish symbol -->
  <g transform="translate(150, 440)" opacity="0.4" stroke="#ffffff" stroke-width="0.8" fill="none">
    <path d="M0,20 L10,0 L20,20"/>
    <line x1="0" y1="0" x2="25" y2="0"/>
    <text x="30" y="15" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.5">Ra 1.6</text>
  </g>

  <!-- Title block (bottom right) -->
  <rect x="560" y="500" width="220" height="80" fill="none" stroke="#3a6a8a" stroke-width="1" opacity="0.4"/>
  <line x1="560" y1="530" x2="780" y2="530" stroke="#3a6a8a" stroke-width="0.5" opacity="0.3"/>
  <line x1="560" y1="555" x2="780" y2="555" stroke="#3a6a8a" stroke-width="0.5" opacity="0.3"/>
  <line x1="670" y1="500" x2="670" y2="580" stroke="#3a6a8a" stroke-width="0.5" opacity="0.3"/>
  <text x="575" y="520" font-family="monospace" font-size="9" fill="#3a6a8a" opacity="0.5">CUSTOM ENGINEERING</text>
  <text x="575" y="545" font-family="monospace" font-size="8" fill="#ea580c" opacity="0.4">DWG NO: CE-2024-001</text>
  <text x="575" y="570" font-family="monospace" font-size="8" fill="#3a6a8a" opacity="0.4">SCALE: 1:2</text>
  <text x="685" y="520" font-family="monospace" font-size="8" fill="#3a6a8a" opacity="0.4">REV: A</text>
  <text x="685" y="545" font-family="monospace" font-size="8" fill="#3a6a8a" opacity="0.4">MATERIAL: SS316</text>

  <!-- Wrench/spanner outline -->
  <g transform="translate(80, 100) rotate(-30)" opacity="0.25" stroke="#778899" stroke-width="1.5" fill="none">
    <path d="M0,15 L70,15 L70,0 Q90,0 100,15 Q110,30 90,30 L70,30 L70,15"/>
    <path d="M0,15 L0,0 Q-10,-5 -15,5 Q-15,25 -5,30 L0,30 Z"/>
    <line x1="75" y1="5" x2="75" y2="25"/>
    <line x1="80" y1="3" x2="80" y2="27"/>
  </g>

  <!-- Pencil -->
  <g transform="translate(650, 80) rotate(20)" opacity="0.25" stroke="#ea580c" stroke-width="1" fill="none">
    <rect x="0" y="0" width="8" height="80" rx="1"/>
    <polygon points="0,80 4,95 8,80"/>
    <line x1="0" y1="10" x2="8" y2="10"/>
    <rect x="0" y="0" width="8" height="10" rx="1" fill="#ea580c" opacity="0.1"/>
  </g>

  <!-- Crosshair center mark -->
  <g opacity="0.3" stroke="#ea580c" stroke-width="0.5">
    <line x1="295" y1="280" x2="305" y2="280"/>
    <line x1="300" y1="275" x2="300" y2="285"/>
  </g>
</svg>
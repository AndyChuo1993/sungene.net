<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2240"/>
      <stop offset="100%" stop-color="#081a2a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="12" fill="url(#bgGrad)"/>
  <!-- Machine body -->
  <rect x="35" y="18" width="40" height="72" rx="3" fill="#667788" stroke="#778899" stroke-width="1"/>
  <rect x="75" y="18" width="10" height="72" rx="2" fill="#556677" stroke="#667788" stroke-width="0.5"/>
  <!-- Hopper -->
  <polygon points="40,18 70,18 78,10 32,10" fill="#778899" stroke="#667788" stroke-width="0.8"/>
  <!-- Seal jaws -->
  <rect x="38" y="58" width="18" height="5" rx="1" fill="url(#orangeGrad)"/>
  <rect x="56" y="58" width="18" height="5" rx="1" fill="url(#orangeGrad)"/>
  <!-- Film roll -->
  <circle cx="90" cy="40" r="10" fill="#445566" stroke="#556677" stroke-width="1"/>
  <circle cx="90" cy="40" r="5" fill="#334455"/>
  <circle cx="90" cy="40" r="2" fill="#556677"/>
  <!-- Conveyor -->
  <rect x="20" y="92" width="80" height="6" rx="2" fill="#2a3a4a" stroke="#445566" stroke-width="0.5"/>
  <circle cx="25" cy="100" r="4" fill="#445566" stroke="#556677" stroke-width="0.8"/>
  <circle cx="95" cy="100" r="4" fill="#445566" stroke="#556677" stroke-width="0.8"/>
  <!-- Bag on conveyor -->
  <rect x="62" y="80" width="16" height="12" rx="1" fill="#1a3a55" stroke="#ea580c" stroke-width="0.6"/>
  <!-- Control panel -->
  <rect x="38" y="30" width="16" height="14" rx="1" fill="#1a2a3a" stroke="#334455" stroke-width="0.5"/>
  <rect x="40" y="32" width="12" height="6" rx="0.5" fill="#0a1520"/>
  <circle cx="43" cy="42" r="1.5" fill="#ea580c"/>
  <circle cx="48" cy="42" r="1.5" fill="#3a8a5a"/>
  <!-- Status light -->
  <circle cx="78" cy="22" r="2" fill="#3a8a5a">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
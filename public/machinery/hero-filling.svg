<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2240"/>
      <stop offset="100%" stop-color="#081a2a"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8899aa"/>
      <stop offset="50%" stop-color="#778899"/>
      <stop offset="100%" stop-color="#667788"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="tankGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#667788"/>
      <stop offset="50%" stop-color="#778899"/>
      <stop offset="100%" stop-color="#667788"/>
    </linearGradient>
    <linearGradient id="nozzleStream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="rgba(234,88,12,0.3)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Floor -->
  <rect x="0" y="520" width="800" height="80" fill="#0d1f30" opacity="0.8"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#1a3a55" stroke-width="1"/>

  <!-- Overhead Frame Structure -->
  <rect x="100" y="80" width="600" height="10" rx="2" fill="#556677" stroke="#667788" stroke-width="1"/>
  <!-- Vertical supports -->
  <rect x="100" y="80" width="12" height="440" fill="#556677" stroke="#667788" stroke-width="1"/>
  <rect x="688" y="80" width="12" height="440" fill="#556677" stroke="#667788" stroke-width="1"/>

  <!-- Liquid Tank (top) -->
  <rect x="250" y="30" width="300" height="60" rx="10" fill="url(#tankGrad)" stroke="#556677" stroke-width="1.5"/>
  <!-- Tank details -->
  <ellipse cx="250" cy="60" rx="10" ry="30" fill="#556677"/>
  <ellipse cx="550" cy="60" rx="10" ry="30" fill="#556677"/>
  <!-- Tank sight glass -->
  <rect x="370" y="38" width="60" height="44" rx="3" fill="#0d1f30" stroke="#556677" stroke-width="1"/>
  <rect x="373" y="50" width="54" height="28" rx="2" fill="#ea580c" opacity="0.2"/>
  <!-- Tank level indicator -->
  <rect x="373" y="55" width="54" height="23" rx="2" fill="#ea580c" opacity="0.15"/>

  <!-- Feed pipes from tank -->
  <rect x="300" y="88" width="8" height="60" fill="#667788" stroke="#556677" stroke-width="0.5"/>
  <rect x="370" y="88" width="8" height="60" fill="#667788" stroke="#556677" stroke-width="0.5"/>
  <rect x="440" y="88" width="8" height="60" fill="#667788" stroke="#556677" stroke-width="0.5"/>
  <rect x="510" y="88" width="8" height="60" fill="#667788" stroke="#556677" stroke-width="0.5"/>

  <!-- Filling Head Assembly -->
  <rect x="240" y="145" width="320" height="30" rx="4" fill="url(#metalGrad)" stroke="#556677" stroke-width="1.5"/>

  <!-- Nozzles -->
  <g>
    <!-- Nozzle 1 -->
    <rect x="296" y="175" width="16" height="40" rx="2" fill="#778899" stroke="#667788" stroke-width="1"/>
    <rect x="299" y="210" width="10" height="8" rx="1" fill="#667788"/>
    <!-- Stream -->
    <rect x="302" y="218" width="4" height="80" rx="2" fill="url(#nozzleStream)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Nozzle 2 -->
    <rect x="366" y="175" width="16" height="40" rx="2" fill="#778899" stroke="#667788" stroke-width="1"/>
    <rect x="369" y="210" width="10" height="8" rx="1" fill="#667788"/>
    <rect x="372" y="218" width="4" height="80" rx="2" fill="url(#nozzleStream)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </rect>

    <!-- Nozzle 3 -->
    <rect x="436" y="175" width="16" height="40" rx="2" fill="#778899" stroke="#667788" stroke-width="1"/>
    <rect x="439" y="210" width="10" height="8" rx="1" fill="#667788"/>
    <rect x="442" y="218" width="4" height="80" rx="2" fill="url(#nozzleStream)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </rect>

    <!-- Nozzle 4 -->
    <rect x="506" y="175" width="16" height="40" rx="2" fill="#778899" stroke="#667788" stroke-width="1"/>
    <rect x="509" y="210" width="10" height="8" rx="1" fill="#667788"/>
    <rect x="512" y="218" width="4" height="80" rx="2" fill="url(#nozzleStream)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
  </g>

  <!-- Conveyor Belt -->
  <rect x="50" y="440" width="700" height="15" rx="4" fill="#2a3a4a" stroke="#445566" stroke-width="1"/>
  <!-- Belt texture -->
  <g opacity="0.2">
    <line x1="80" y1="440" x2="80" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="120" y1="440" x2="120" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="160" y1="440" x2="160" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="200" y1="440" x2="200" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="240" y1="440" x2="240" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="280" y1="440" x2="280" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="320" y1="440" x2="320" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="360" y1="440" x2="360" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="400" y1="440" x2="400" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="440" y1="440" x2="440" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="480" y1="440" x2="480" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="520" y1="440" x2="520" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="560" y1="440" x2="560" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="600" y1="440" x2="600" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="640" y1="440" x2="640" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="680" y1="440" x2="680" y2="455" stroke="#556677" stroke-width="0.5"/>
    <line x1="720" y1="440" x2="720" y2="455" stroke="#556677" stroke-width="0.5"/>
  </g>
  <!-- Conveyor rollers -->
  <circle cx="60" cy="460" r="10" fill="#445566" stroke="#556677" stroke-width="1.5"/>
  <circle cx="60" cy="460" r="4" fill="#334455"/>
  <circle cx="740" cy="460" r="10" fill="#445566" stroke="#556677" stroke-width="1.5"/>
  <circle cx="740" cy="460" r="4" fill="#334455"/>
  <!-- Conveyor legs -->
  <rect x="55" y="468" width="10" height="52" fill="#445566"/>
  <rect x="735" y="468" width="10" height="52" fill="#445566"/>
  <rect x="390" y="455" width="10" height="65" fill="#445566"/>

  <!-- Bottles under nozzles (being filled) -->
  <!-- Bottle 1 - partially filled -->
  <path d="M290,440 L290,320 Q290,310 296,310 L296,300 L312,300 L312,310 Q318,310 318,320 L318,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="292" y="380" width="24" height="60" rx="1" fill="#ea580c" opacity="0.25"/>

  <!-- Bottle 2 - being filled -->
  <path d="M360,440 L360,320 Q360,310 366,310 L366,300 L382,300 L382,310 Q388,310 388,320 L388,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="362" y="360" width="24" height="80" rx="1" fill="#ea580c" opacity="0.25"/>

  <!-- Bottle 3 - almost full -->
  <path d="M430,440 L430,320 Q430,310 436,310 L436,300 L452,300 L452,310 Q458,310 458,320 L458,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="432" y="330" width="24" height="110" rx="1" fill="#ea580c" opacity="0.25"/>

  <!-- Bottle 4 - nearly full -->
  <path d="M500,440 L500,320 Q500,310 506,310 L506,300 L522,300 L522,310 Q528,310 528,320 L528,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="502" y="325" width="24" height="115" rx="1" fill="#ea580c" opacity="0.25"/>

  <!-- Filled bottles (exiting right) -->
  <path d="M610,440 L610,320 Q610,310 616,310 L616,300 L632,300 L632,310 Q638,310 638,320 L638,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="612" y="325" width="24" height="115" rx="1" fill="#ea580c" opacity="0.3"/>
  <!-- Cap -->
  <rect x="612" y="296" width="24" height="6" rx="2" fill="#ea580c"/>

  <path d="M660,440 L660,320 Q660,310 666,310 L666,300 L682,300 L682,310 Q688,310 688,320 L688,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="662" y="325" width="24" height="115" rx="1" fill="#ea580c" opacity="0.3"/>
  <rect x="662" y="296" width="24" height="6" rx="2" fill="#ea580c"/>

  <!-- Empty bottles (entering left) -->
  <path d="M130,440 L130,320 Q130,310 136,310 L136,300 L152,300 L152,310 Q158,310 158,320 L158,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <path d="M180,440 L180,320 Q180,310 186,310 L186,300 L202,300 L202,310 Q208,310 208,320 L208,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <path d="M230,440 L230,320 Q230,310 236,310 L236,300 L252,300 L252,310 Q258,310 258,320 L258,440 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Capping station (right side) -->
  <rect x="580" y="145" width="60" height="100" rx="3" fill="#556677" stroke="#667788" stroke-width="1"/>
  <rect x="590" y="245" width="40" height="50" rx="2" fill="#667788"/>
  <circle cx="610" cy="270" r="8" fill="#445566" stroke="#556677" stroke-width="1"/>

  <!-- Control panel -->
  <rect x="120" y="140" width="80" height="120" rx="4" fill="#1a2a3a" stroke="#334455" stroke-width="1.5"/>
  <rect x="128" y="148" width="64" height="35" rx="2" fill="#0a1520"/>
  <text x="135" y="166" font-family="monospace" font-size="8" fill="#ea580c" opacity="0.8">FILL: 500ml</text>
  <text x="135" y="178" font-family="monospace" font-size="8" fill="#3a8a5a" opacity="0.8">RATE: 120/m</text>
  <circle cx="140" cy="200" r="5" fill="#3a8a5a">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="158" cy="200" r="5" fill="#ea580c" opacity="0.3"/>
  <rect x="130" y="215" width="58" height="6" rx="2" fill="#334455"/>
  <rect x="130" y="215" width="35" height="6" rx="2" fill="url(#orangeGrad)"/>
  <rect x="130" y="230" width="58" height="6" rx="2" fill="#334455"/>
  <rect x="130" y="230" width="45" height="6" rx="2" fill="url(#orangeGrad)"/>

  <!-- Guide rails on conveyor -->
  <line x1="100" y1="435" x2="750" y2="435" stroke="#556677" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="435" x2="100" y2="420" stroke="#556677" stroke-width="1.5" opacity="0.6"/>
  <line x1="750" y1="435" x2="750" y2="420" stroke="#556677" stroke-width="1.5" opacity="0.6"/>

  <!-- Direction arrow -->
  <path d="M680,480 L720,490 L680,500" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.4"/>
  <line x1="600" y1="490" x2="720" y2="490" stroke="#ea580c" stroke-width="1" opacity="0.3"/>
</svg>
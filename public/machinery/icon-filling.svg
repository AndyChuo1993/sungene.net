<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2240"/>
      <stop offset="100%" stop-color="#081a2a"/>
    </linearGradient>
    <linearGradient id="nozzleStream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="rgba(234,88,12,0.2)"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="12" fill="url(#bgGrad)"/>
  <!-- Overhead frame -->
  <rect x="15" y="20" width="90" height="5" rx="1.5" fill="#556677" stroke="#667788" stroke-width="0.5"/>
  <!-- Tank -->
  <rect x="30" y="10" width="60" height="14" rx="4" fill="#667788" stroke="#556677" stroke-width="1"/>
  <rect x="50" y="12" width="20" height="10" rx="2" fill="#0d1f30" stroke="#556677" stroke-width="0.5"/>
  <!-- Feed pipes -->
  <rect x="40" y="24" width="3" height="18" fill="#667788"/>
  <rect x="58" y="24" width="3" height="18" fill="#667788"/>
  <rect x="77" y="24" width="3" height="18" fill="#667788"/>
  <!-- Filling head -->
  <rect x="28" y="40" width="64" height="8" rx="2" fill="#778899" stroke="#667788" stroke-width="0.8"/>
  <!-- Nozzles -->
  <rect x="38" y="48" width="5" height="12" rx="1" fill="#778899"/>
  <rect x="57" y="48" width="5" height="12" rx="1" fill="#778899"/>
  <rect x="77" y="48" width="5" height="12" rx="1" fill="#778899"/>
  <!-- Streams -->
  <rect x="39.5" y="60" width="2" height="22" rx="1" fill="url(#nozzleStream)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="58.5" y="60" width="2" height="22" rx="1" fill="url(#nozzleStream)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <rect x="78.5" y="60" width="2" height="22" rx="1" fill="url(#nozzleStream)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
  <!-- Bottles -->
  <path d="M34,95 L34,72 Q34,68 37,68 L37,65 L44,65 L44,68 Q47,68 47,72 L47,95 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <rect x="35" y="82" width="11" height="13" rx="0.5" fill="#ea580c" opacity="0.2"/>
  <path d="M53,95 L53,72 Q53,68 56,68 L56,65 L63,65 L63,68 Q66,68 66,72 L66,95 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <rect x="54" y="78" width="11" height="17" rx="0.5" fill="#ea580c" opacity="0.2"/>
  <path d="M73,95 L73,72 Q73,68 76,68 L76,65 L83,65 L83,68 Q86,68 86,72 L86,95 Z" fill="url(#bottleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <rect x="74" y="75" width="11" height="20" rx="0.5" fill="#ea580c" opacity="0.2"/>
  <!-- Conveyor -->
  <rect x="15" y="95" width="90" height="5" rx="2" fill="#2a3a4a" stroke="#445566" stroke-width="0.5"/>
  <circle cx="20" cy="102" r="3.5" fill="#445566" stroke="#556677" stroke-width="0.8"/>
  <circle cx="100" cy="102" r="3.5" fill="#445566" stroke="#556677" stroke-width="0.8"/>
  <!-- Guide rails -->
  <line x1="20" y1="93" x2="100" y2="93" stroke="#556677" stroke-width="0.8" opacity="0.5"/>
  <!-- Vertical supports -->
  <rect x="15" y="20" width="4" height="80" fill="#445566" opacity="0.7"/>
  <rect x="101" y="20" width="4" height="80" fill="#445566" opacity="0.7"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2240"/>
      <stop offset="100%" stop-color="#081a2a"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8899aa"/>
      <stop offset="50%" stop-color="#667788"/>
      <stop offset="100%" stop-color="#556677"/>
    </linearGradient>
    <linearGradient id="metalSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#556677"/>
      <stop offset="100%" stop-color="#445566"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="conveyorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334455"/>
      <stop offset="100%" stop-color="#2a3a4a"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Grid lines for industrial feel -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Floor -->
  <rect x="0" y="520" width="800" height="80" fill="#0d1f30" opacity="0.8"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#1a3a55" stroke-width="1"/>

  <!-- VFFS Machine Main Body -->
  <!-- Machine frame - left side -->
  <rect x="250" y="60" width="200" height="460" rx="3" fill="url(#metalGrad)" stroke="#445566" stroke-width="1.5"/>
  <!-- Machine frame - right panel -->
  <rect x="450" y="60" width="40" height="460" rx="2" fill="url(#metalSide)" stroke="#445566" stroke-width="1"/>

  <!-- Hopper on top -->
  <polygon points="290,60 410,60 430,20 270,20" fill="#778899" stroke="#556677" stroke-width="1.5"/>
  <polygon points="270,20 430,20 420,5 280,5" fill="#8899aa" stroke="#556677" stroke-width="1"/>
  <!-- Hopper opening -->
  <ellipse cx="350" cy="10" rx="65" ry="8" fill="#334455" stroke="#556677" stroke-width="1"/>

  <!-- Film Roll (right side) -->
  <ellipse cx="520" cy="180" rx="40" ry="40" fill="#445566" stroke="#556677" stroke-width="1.5"/>
  <ellipse cx="520" cy="180" rx="25" ry="25" fill="#334455" stroke="#445566" stroke-width="1"/>
  <ellipse cx="520" cy="180" rx="10" ry="10" fill="#556677"/>
  <!-- Film path -->
  <path d="M520,220 L520,280 Q520,300 490,300 L460,300" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Forming Tube -->
  <rect x="325" y="100" width="50" height="200" rx="5" fill="#556677" stroke="#667788" stroke-width="1"/>
  <rect x="330" y="105" width="40" height="190" rx="3" fill="#445566"/>

  <!-- Seal Jaws -->
  <rect x="270" y="310" width="80" height="20" rx="3" fill="url(#orangeGrad)" stroke="#c2410c" stroke-width="1"/>
  <rect x="350" y="310" width="80" height="20" rx="3" fill="url(#orangeGrad)" stroke="#c2410c" stroke-width="1"/>
  <!-- Jaw details -->
  <line x1="280" y1="320" x2="340" y2="320" stroke="#c2410c" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="320" x2="420" y2="320" stroke="#c2410c" stroke-width="1" opacity="0.5"/>

  <!-- Cut knife indicator -->
  <line x1="270" y1="345" x2="430" y2="345" stroke="#ea580c" stroke-width="1.5" opacity="0.6"/>

  <!-- Bag being formed (semi-transparent) -->
  <rect x="310" y="345" width="80" height="100" rx="2" fill="url(#filmGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Control Panel -->
  <rect x="260" y="130" width="60" height="80" rx="3" fill="#1a2a3a" stroke="#334455" stroke-width="1"/>
  <!-- Screen -->
  <rect x="265" y="135" width="50" height="30" rx="2" fill="#0a1520"/>
  <!-- Screen content -->
  <rect x="268" y="138" width="44" height="24" rx="1" fill="#0d2840"/>
  <line x1="270" y1="148" x2="310" y2="148" stroke="#ea580c" stroke-width="1" opacity="0.8"/>
  <line x1="270" y1="153" x2="300" y2="153" stroke="#3a8a5a" stroke-width="1" opacity="0.6"/>
  <!-- Buttons -->
  <circle cx="272" cy="178" r="4" fill="#ea580c"/>
  <circle cx="285" cy="178" r="4" fill="#3a8a5a"/>
  <circle cx="298" cy="178" r="4" fill="#667788"/>
  <rect x="265" y="190" width="50" height="12" rx="2" fill="#2a3a4a"/>

  <!-- Conveyor Belt -->
  <rect x="100" y="480" width="600" height="20" rx="4" fill="url(#conveyorGrad)" stroke="#445566" stroke-width="1"/>
  <!-- Conveyor rollers -->
  <circle cx="130" cy="505" r="12" fill="#445566" stroke="#556677" stroke-width="1.5"/>
  <circle cx="130" cy="505" r="5" fill="#334455"/>
  <circle cx="670" cy="505" r="12" fill="#445566" stroke="#556677" stroke-width="1.5"/>
  <circle cx="670" cy="505" r="5" fill="#334455"/>
  <!-- Conveyor belt lines -->
  <line x1="130" y1="480" x2="670" y2="480" stroke="#556677" stroke-width="0.5"/>
  <line x1="130" y1="500" x2="670" y2="500" stroke="#445566" stroke-width="0.5"/>
  <!-- Belt texture -->
  <g opacity="0.3">
    <line x1="200" y1="480" x2="200" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="250" y1="480" x2="250" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="300" y1="480" x2="300" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="350" y1="480" x2="350" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="400" y1="480" x2="400" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="450" y1="480" x2="450" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="500" y1="480" x2="500" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="550" y1="480" x2="550" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="600" y1="480" x2="600" y2="500" stroke="#556677" stroke-width="0.5"/>
    <line x1="650" y1="480" x2="650" y2="500" stroke="#556677" stroke-width="0.5"/>
  </g>

  <!-- Sealed bags on conveyor -->
  <!-- Bag 1 -->
  <rect x="500" y="440" width="55" height="40" rx="3" fill="#1a3a55" stroke="#ea580c" stroke-width="1" opacity="0.9"/>
  <line x1="500" y1="445" x2="555" y2="445" stroke="#ea580c" stroke-width="1.5" opacity="0.7"/>
  <line x1="500" y1="475" x2="555" y2="475" stroke="#ea580c" stroke-width="1.5" opacity="0.7"/>
  <rect x="510" y="452" width="35" height="8" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <!-- Bag 2 -->
  <rect x="580" y="440" width="55" height="40" rx="3" fill="#1a3a55" stroke="#ea580c" stroke-width="1" opacity="0.9"/>
  <line x1="580" y1="445" x2="635" y2="445" stroke="#ea580c" stroke-width="1.5" opacity="0.7"/>
  <line x1="580" y1="475" x2="635" y2="475" stroke="#ea580c" stroke-width="1.5" opacity="0.7"/>
  <rect x="590" y="452" width="35" height="8" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <!-- Bag 3 (on machine exit) -->
  <rect x="420" y="440" width="55" height="40" rx="3" fill="#1a3a55" stroke="#ea580c" stroke-width="1" opacity="0.7"/>
  <line x1="420" y1="445" x2="475" y2="445" stroke="#ea580c" stroke-width="1.5" opacity="0.5"/>
  <line x1="420" y1="475" x2="475" y2="475" stroke="#ea580c" stroke-width="1.5" opacity="0.5"/>

  <!-- Machine legs/supports -->
  <rect x="270" y="510" width="15" height="30" fill="#556677"/>
  <rect x="415" y="510" width="15" height="30" fill="#556677"/>
  <rect x="460" y="510" width="15" height="30" fill="#445566"/>

  <!-- Pneumatic lines -->
  <path d="M490,150 Q510,150 510,170" fill="none" stroke="#667788" stroke-width="3" stroke-linecap="round"/>
  <path d="M490,180 Q500,180 500,200 Q500,220 490,220" fill="none" stroke="#667788" stroke-width="2"/>

  <!-- Warning stripes on machine base -->
  <g opacity="0.4">
    <rect x="250" y="500" width="240" height="10" fill="#ea580c"/>
    <rect x="255" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="275" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="295" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="315" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="335" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="355" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="375" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="395" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="415" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="435" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="455" y="500" width="10" height="10" fill="#081a2a"/>
    <rect x="475" y="500" width="10" height="10" fill="#081a2a"/>
  </g>

  <!-- Ambient glow from orange accents -->
  <ellipse cx="350" cy="320" rx="100" ry="30" fill="#ea580c" opacity="0.05"/>

  <!-- Status indicator lights -->
  <circle cx="460" cy="80" r="4" fill="#3a8a5a">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="475" cy="80" r="4" fill="#ea580c" opacity="0.3"/>

  <!-- Subtle machine vibration lines -->
  <g opacity="0.1">
    <line x1="245" y1="200" x2="240" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="245" y1="250" x2="238" y2="250" stroke="#ffffff" stroke-width="1"/>
    <line x1="245" y1="300" x2="240" y2="300" stroke="#ffffff" stroke-width="1"/>
    <line x1="495" y1="200" x2="500" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="495" y1="300" x2="502" y2="300" stroke="#ffffff" stroke-width="1"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2240"/>
      <stop offset="100%" stop-color="#081a2a"/>
    </linearGradient>
    <linearGradient id="kettleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8899aa"/>
      <stop offset="40%" stop-color="#778899"/>
      <stop offset="100%" stop-color="#556677"/>
    </linearGradient>
    <linearGradient id="kettleInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a4a"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <radialGradient id="kettleShine" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#778899"/>
      <stop offset="50%" stop-color="#667788"/>
      <stop offset="100%" stop-color="#556677"/>
    </linearGradient>
    <linearGradient id="steamGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Floor -->
  <rect x="0" y="520" width="800" height="80" fill="#0d1f30" opacity="0.8"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#1a3a55" stroke-width="1"/>

  <!-- Kettle Support Structure -->
  <rect x="280" y="480" width="20" height="50" fill="#556677"/>
  <rect x="500" y="480" width="20" height="50" fill="#556677"/>
  <rect x="260" y="470" width="280" height="15" rx="3" fill="#667788" stroke="#556677" stroke-width="1"/>

  <!-- Main Cooking Kettle -->
  <ellipse cx="400" cy="340" rx="140" ry="130" fill="url(#kettleGrad)" stroke="#556677" stroke-width="2"/>
  <ellipse cx="400" cy="340" rx="140" ry="130" fill="url(#kettleShine)"/>
  <!-- Kettle opening at top -->
  <ellipse cx="400" cy="220" rx="120" ry="25" fill="url(#kettleInner)" stroke="#667788" stroke-width="1.5"/>
  <!-- Kettle rim -->
  <ellipse cx="400" cy="220" rx="125" ry="28" fill="none" stroke="#8899aa" stroke-width="2"/>

  <!-- Agitator/Mixer shaft -->
  <rect x="395" y="80" width="10" height="140" fill="#778899" stroke="#667788" stroke-width="1"/>
  <!-- Motor housing on top -->
  <rect x="370" y="60" width="60" height="30" rx="5" fill="#556677" stroke="#667788" stroke-width="1.5"/>
  <rect x="380" y="50" width="40" height="15" rx="3" fill="#667788" stroke="#778899" stroke-width="1"/>
  <!-- Motor vent lines -->
  <line x1="375" y1="70" x2="375" y2="85" stroke="#445566" stroke-width="1"/>
  <line x1="382" y1="70" x2="382" y2="85" stroke="#445566" stroke-width="1"/>
  <line x1="418" y1="70" x2="418" y2="85" stroke="#445566" stroke-width="1"/>
  <line x1="425" y1="70" x2="425" y2="85" stroke="#445566" stroke-width="1"/>

  <!-- Mixer blades (visible inside kettle) -->
  <g opacity="0.4">
    <line x1="340" y1="300" x2="400" y2="280" stroke="#8899aa" stroke-width="4" stroke-linecap="round"/>
    <line x1="400" y1="280" x2="460" y2="300" stroke="#8899aa" stroke-width="4" stroke-linecap="round"/>
    <line x1="360" y1="340" x2="400" y2="320" stroke="#8899aa" stroke-width="3" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="440" y2="340" stroke="#8899aa" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Steam rising -->
  <g opacity="0.15">
    <path d="M360,195 Q355,170 365,145 Q370,120 360,95" fill="none" stroke="#ffffff" stroke-width="2">
      <animate attributeName="d" values="M360,195 Q355,170 365,145 Q370,120 360,95;M360,195 Q365,170 355,145 Q350,120 360,95;M360,195 Q355,170 365,145 Q370,120 360,95" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M400,190 Q395,160 405,130 Q410,100 400,70" fill="none" stroke="#ffffff" stroke-width="2.5">
      <animate attributeName="d" values="M400,190 Q395,160 405,130 Q410,100 400,70;M400,190 Q405,160 395,130 Q390,100 400,70;M400,190 Q395,160 405,130 Q410,100 400,70" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M440,195 Q435,165 445,135 Q450,105 440,80" fill="none" stroke="#ffffff" stroke-width="2">
      <animate attributeName="d" values="M440,195 Q435,165 445,135 Q450,105 440,80;M440,195 Q445,165 435,135 Q430,105 440,80;M440,195 Q435,165 445,135 Q450,105 440,80" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Pipes - Input pipe (left) -->
  <rect x="140" y="260" width="120" height="18" rx="9" fill="url(#pipeGrad)" stroke="#556677" stroke-width="1"/>
  <!-- Pipe elbow -->
  <rect x="130" y="200" width="18" height="70" rx="9" fill="url(#pipeGrad)" stroke="#556677" stroke-width="1"/>
  <!-- Valve on input pipe -->
  <rect x="180" y="254" width="30" height="30" rx="3" fill="#ea580c" stroke="#c2410c" stroke-width="1"/>
  <circle cx="195" cy="269" r="8" fill="#c2410c" stroke="#ea580c" stroke-width="1"/>
  <line x1="195" y1="261" x2="195" y2="254" stroke="#ea580c" stroke-width="2"/>

  <!-- Output pipe (bottom) -->
  <rect x="391" y="460" width="18" height="60" rx="9" fill="url(#pipeGrad)" stroke="#556677" stroke-width="1"/>
  <!-- Valve -->
  <rect x="380" y="475" width="40" height="20" rx="3" fill="#667788" stroke="#556677" stroke-width="1"/>
  <circle cx="400" cy="485" r="6" fill="#ea580c"/>

  <!-- Pipe (right side - steam/pressure) -->
  <rect x="540" y="290" width="100" height="14" rx="7" fill="url(#pipeGrad)" stroke="#556677" stroke-width="1"/>
  <rect x="630" y="250" width="14" height="50" rx="7" fill="url(#pipeGrad)" stroke="#556677" stroke-width="1"/>
  <!-- Pressure gauge -->
  <circle cx="637" cy="240" r="18" fill="#1a2a3a" stroke="#667788" stroke-width="2"/>
  <circle cx="637" cy="240" r="14" fill="#0d1f30"/>
  <line x1="637" y1="240" x2="645" y2="232" stroke="#ea580c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gauge markings -->
  <g stroke="#556677" stroke-width="0.5" opacity="0.6">
    <line x1="637" y1="228" x2="637" y2="231"/>
    <line x1="649" y1="240" x2="646" y2="240"/>
    <line x1="637" y1="252" x2="637" y2="249"/>
    <line x1="625" y1="240" x2="628" y2="240"/>
  </g>

  <!-- Control Panel (right side) -->
  <rect x="620" y="340" width="120" height="160" rx="5" fill="#1a2a3a" stroke="#334455" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="630" y="350" width="100" height="50" rx="3" fill="#0a1520" stroke="#334455" stroke-width="1"/>
  <!-- Screen content -->
  <text x="640" y="370" font-family="monospace" font-size="10" fill="#ea580c" opacity="0.8">TEMP: 185°C</text>
  <text x="640" y="385" font-family="monospace" font-size="10" fill="#3a8a5a" opacity="0.8">RPM: 120</text>
  <!-- Buttons -->
  <circle cx="645" cy="420" r="8" fill="#ea580c" stroke="#c2410c" stroke-width="1"/>
  <circle cx="670" cy="420" r="8" fill="#3a8a5a" stroke="#2a6a4a" stroke-width="1"/>
  <circle cx="695" cy="420" r="8" fill="#445566" stroke="#556677" stroke-width="1"/>
  <!-- Sliders -->
  <rect x="635" y="445" width="90" height="4" rx="2" fill="#334455"/>
  <rect x="635" y="445" width="50" height="4" rx="2" fill="url(#orangeGrad)"/>
  <circle cx="685" cy="447" r="5" fill="#ea580c" stroke="#c2410c" stroke-width="1"/>
  <rect x="635" y="465" width="90" height="4" rx="2" fill="#334455"/>
  <rect x="635" y="465" width="70" height="4" rx="2" fill="url(#orangeGrad)"/>
  <circle cx="705" cy="467" r="5" fill="#ea580c" stroke="#c2410c" stroke-width="1"/>
  <!-- Panel label -->
  <rect x="645" y="485" width="70" height="8" rx="1" fill="#334455"/>

  <!-- Temperature probe -->
  <line x1="540" y1="350" x2="480" y2="310" stroke="#778899" stroke-width="3" stroke-linecap="round"/>
  <circle cx="545" cy="350" r="5" fill="#ea580c"/>

  <!-- Kettle jacket detail lines -->
  <path d="M270,300 Q270,340 280,380" fill="none" stroke="#667788" stroke-width="0.5" opacity="0.4"/>
  <path d="M530,300 Q530,340 520,380" fill="none" stroke="#667788" stroke-width="0.5" opacity="0.4"/>

  <!-- Safety rail around kettle -->
  <path d="M240,250 L240,400" fill="none" stroke="#667788" stroke-width="2"/>
  <path d="M560,250 L560,400" fill="none" stroke="#667788" stroke-width="2"/>

  <!-- Status lights -->
  <circle cx="625" cy="345" r="3" fill="#3a8a5a">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="735" cy="345" r="3" fill="#ea580c" opacity="0.3"/>

  <!-- Kettle surface reflection -->
  <ellipse cx="350" cy="300" rx="30" ry="80" fill="rgba(255,255,255,0.03)" transform="rotate(-15,350,300)"/>
</svg>